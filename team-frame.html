<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Frame — Agentforce Hackathon 2026</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --ink: #17324d;
      --ink2: #4d6984;
      --ink3: #8aa0b4;
      --pink: #ff4f93;
      --pink2: #ff8cb8;
      --purple: #7440c8;
      --font: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif;
      --serif: 'DM Serif Display', Georgia, serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: #eef2f7;
      color: var(--ink);
      min-height: 100vh;
      padding: 40px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── toolbar ── */
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      background: #fff;
      border: 1px solid #e2eaf2;
      border-radius: 999px;
      padding: 8px 8px 8px 20px;
      box-shadow: 0 8px 28px rgba(23, 50, 77, 0.08);
    }

    .toolbar span {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink2);
      margin-right: 6px;
    }

    .print-btn {
      border: none;
      background: var(--pink);
      color: #fff;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 20px rgba(255, 79, 147, 0.32);
      transition: all .2s;
    }

    .print-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(255, 79, 147, 0.42);
    }

    /* ── frame ── */
    .frame-wrap {
      width: 1080px;
      height: 1080px;
      max-width: 92vw;
      max-height: 92vw;
      position: relative;
      box-shadow: 0 30px 70px rgba(23, 50, 77, 0.18);
      overflow: hidden;
      background: #000;
    }

    .frame-bg {
      position: absolute;
      inset: 0;
      background: url('photos/bg.jpg') center/cover no-repeat;
    }

    .frame-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(5, 0, 20, 0.72) 0%,
        rgba(10, 0, 30, 0.55) 50%,
        rgba(5, 0, 20, 0.80) 100%
      );
    }

    .frame-brand {
      position: absolute;
      top: 48px;
      left: 52px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 2;
    }

    .frame-brand-agentforce {
      font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.9);
      line-height: 1;
    }

    .frame-brand img.hackathon-img {
      height: 44px;
      width: auto;
      align-self: flex-start;
    }

    .frame-year-pill {
      display: inline-flex;
      align-self: flex-start;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 999px;
      padding: 5px 16px;
      color: rgba(255,255,255,0.75);
      backdrop-filter: blur(6px);
    }

    .frame-photo-area {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      width: 100%;
      height: 624px;
      border-left: none;
      border-right: none;
      border-top: 3px solid rgba(255,255,255,0.22);
      border-bottom: 3px solid rgba(255,255,255,0.22);
      border-radius: 0;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      overflow: hidden;
    }

    .frame-photo-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .frame-photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: rgba(255,255,255,0.35);
    }

    .frame-photo-placeholder svg {
      opacity: 0.4;
    }

    .frame-photo-placeholder span {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .frame-team {
      position: absolute;
      bottom: 128px;
      left: 52px;
      z-index: 2;
    }

    .frame-team-name {
      font-family: var(--serif);
      font-size: 52px;
      line-height: 1;
      color: #fff;
      letter-spacing: -1px;
      text-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    .frame-team-bar {
      width: 56px;
      height: 4px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      margin-top: 12px;
    }

    .frame-sponsors {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 0 52px;
      z-index: 3;
    }

    .frame-sponsors img {
      height: 28px;
      width: auto;
      max-width: 110px;
      object-fit: contain;
      filter: grayscale(0.15);
    }

    /* ── controls ── */
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      background: #fff;
      border: 1px solid #e2eaf2;
      border-radius: 20px;
      padding: 14px 24px;
      box-shadow: 0 8px 28px rgba(23,50,77,0.08);
    }

    .controls span {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink2);
    }

    .controls input[type="text"] {
      border: 1px solid #e2eaf2;
      border-radius: 999px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      outline: none;
      width: 220px;
    }

    .controls select {
      border: 1px solid #e2eaf2;
      border-radius: 999px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      outline: none;
      background: #fff;
      cursor: pointer;
    }

    .controls label {
      border: none;
      background: #f2f5f9;
      color: var(--ink2);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 999px;
      cursor: pointer;
    }

    /* ── print ── */
    @media print {
      body {
        background: #fff !important;
        padding: 0 !important;
        display: block !important;
      }

      .toolbar, .controls { display: none !important; }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .frame-wrap {
        box-shadow: none !important;
        width: 1080px !important;
        height: 1080px !important;
        max-width: none !important;
        max-height: none !important;
        margin: 0 !important;
      }
    }
  </style>
</head>

<body>

  <div class="toolbar">
    <span>Team Frame</span>
    <button class="print-btn" onclick="window.print()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 6 2 18 2 18 9" />
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
        <rect x="6" y="14" width="12" height="8" />
      </svg>
      Print / Save as PDF
    </button>
  </div>

  <div class="frame-wrap">
    <div class="frame-bg"></div>
    <div class="frame-overlay"></div>

    <!-- top-left brand -->
    <div class="frame-brand">
      <span class="frame-brand-agentforce">Agentforce</span>
      <img class="hackathon-img" src="photos/hackathon.png" alt="Hackathon" />
      <div class="frame-year-pill">18 June 2026 · University of Mauritius</div>
    </div>

    <!-- centre photo placeholder -->
    <div class="frame-photo-area" id="framePhotoArea">
      <div class="frame-photo-placeholder" id="framePhotoPlaceholder">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <span>Team Photo</span>
      </div>
    </div>

    <!-- bottom-left team name -->
    <div class="frame-team">
      <div class="frame-team-name" id="frameTeamName"></div>
      <div class="frame-team-bar"></div>
    </div>

    <!-- sponsor strip -->
    <div class="frame-sponsors">
      <img src="photos/nexavenu-logo.png" alt="Nexavenu" />
      <img src="photos/doppler-ai.webp" alt="Doppler AI" />
      <img src="photos/Emtel_Logo.png" alt="Emtel" style="height:42px;" />
      <img src="photos/CC-logo.webp" alt="Computer Club" style="height:42px;" />
      <img src="photos/su-logo-hovered.png" alt="Student Union" style="height:42px;" />
      <img src="photos/uom-logo.png" alt="UoM" style="height:66px;" />
    </div>
  </div>

  <div class="controls">
    <span>Team:</span>
    <select onchange="frameSetTeam(this.value)">
      <option value="">— select team —</option>
      <option>Binary Bandits</option>
      <option>BlueSky</option>
      <option>CipherCrew</option>
      <option>DODO DEVS</option>
      <option>Freeapikeys</option>
      <option>FRIDAY.exe</option>
      <option>HeisenBug</option>
      <option>KindOf Developers</option>
      <option>Lazarus</option>
      <option>Les Mordeurs</option>
      <option>Nexova</option>
      <option>Peak</option>
    </select>
    <label>
      Upload Photo
      <input type="file" accept="image/*" onchange="frameLoadPhoto(this)" style="display:none;" />
    </label>
  </div>

  <script>
    let printStyle = document.createElement('style');
    document.head.appendChild(printStyle);

    globalThis.addEventListener('beforeprint', () => {
      printStyle.textContent = `@page { size: 1080px 1080px; margin: 0; }`;
    });

    function frameSetTeam(val) {
      document.getElementById('frameTeamName').textContent = val;
    }

    function frameLoadPhoto(input) {
      const file = input.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const area = document.getElementById('framePhotoArea');
      const placeholder = document.getElementById('framePhotoPlaceholder');
      let img = area.querySelector('img.frame-user-photo');
      if (!img) {
        img = document.createElement('img');
        img.className = 'frame-user-photo';
        img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
        area.appendChild(img);
      }
      img.src = url;
      placeholder.style.display = 'none';
    }
  </script>

</body>
</html>
