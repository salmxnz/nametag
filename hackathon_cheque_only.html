<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cheque — Agentforce Hackathon 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink:   #17324d;
  --ink2:  #4d6984;
  --ink3:  #8aa0b4;
  --pink:  #ff4f93;
  --pink2: #ff8cb8;
  --border:#e2eaf2;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family:'Instrument Sans','Helvetica Neue',Arial,sans-serif;
  background:#eef2f7;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:24px;
  padding:40px 20px;
}

.print-btn {
  border:none; background:var(--pink); color:#fff;
  font-family:inherit; font-size:13px; font-weight:700;
  padding:10px 24px; border-radius:999px; cursor:pointer;
  box-shadow:0 6px 20px rgba(255,79,147,0.32);
  display:inline-flex; align-items:center; gap:8px;
}

/* ══ CHEQUE WRAPPER
   Physical: 70 cm × 33 cm  |  preview: 1cm = 10px → 700×330px  */
.cheque-wrap {
  width: 700px;
  height: 330px;
  box-shadow: 0 24px 60px rgba(23,50,77,0.22);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

.cheque {
  width: 100%; height: 100%;
  position: relative;
  display: flex;
  flex-direction: column;
  /* gradient throughout the cheque */
  background:
    linear-gradient(135deg,
      #f7ecf5 0%,
      #f3eeff 30%,
      #eef3ff 65%,
      #f7f9ff 100%);
}

/* subtle grain texture */
.cheque::after {
  content:'';
  position:absolute; inset:0; pointer-events:none; z-index:0;
  opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
}

/* top gradient bar */
.cheque-bar-top {
  height: 7px; flex-shrink: 0; position:relative; z-index:1;
  background: linear-gradient(90deg, #17324d 0%, var(--pink) 55%, var(--pink2) 100%);
}

/* main body */
.cheque-body {
  flex: 1;
  padding: 18px 30px 16px;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* watermark — hackathon logo */
.cheque-wm {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none; z-index:0;
  opacity:0.04;
  width:80%;
}

/* header row */
.cheque-hdr {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
}
.cheque-logo img { height:26px; width:auto; }

.cheque-hdr-right {
  text-align:right;
}
.cheque-event-name {
  font-size:13px; font-weight:800; color:var(--ink); letter-spacing:-0.2px;
  display:flex; align-items:center; gap:6px; justify-content:flex-end;
}
.cheque-event-name img {
  height:15px; width:auto;
  /* hackathon logo is white-on-black — invert to dark */
  filter: invert(1) brightness(0.25);
}
.cheque-sub {
  font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--pink); margin-top:2px;
}

/* divider */
.cheque-hr {
  height:1px; background:linear-gradient(90deg, var(--pink), #e2eaf2 80%);
  margin-bottom:14px; flex-shrink:0;
}

/* date chip */
.cheque-date {
  display:inline-flex; align-items:center; gap:7px;
  border:1.5px solid var(--border); border-radius:999px;
  padding:4px 12px; font-size:11px; font-weight:600; color:var(--ink2);
  margin-bottom:14px; align-self:flex-start; background:rgba(255,255,255,0.6);
}
.cheque-date::before {
  content:''; display:block; width:6px; height:6px;
  border-radius:50%; background:var(--pink);
}

/* field rows */
.f-row {
  display:flex; align-items:flex-end; gap:10px;
  margin-bottom:10px;
}
.f-label {
  font-size:8.5px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--ink3); white-space:nowrap; flex-shrink:0; padding-bottom:4px;
}
.f-line {
  flex:1; border:none; border-bottom:1.5px solid rgba(23,50,77,0.15);
  height:20px; background:transparent;
}
.f-line-short { width:220px; flex:none; }

/* amount section — Rs before the box */
.f-amount-group {
  display:flex; align-items:center; gap:6px; flex-shrink:0;
}
.f-rs {
  font-size:14px; font-weight:800; color:var(--ink); padding-bottom:2px;
}
.f-amount-box {
  border:2px solid var(--ink);
  border-radius:6px;
  padding:4px 14px;
  min-width:140px;
  background:rgba(255,255,255,0.55);
}
.f-amount-box-label {
  font-size:7px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--ink3);
}
.f-amount-val {
  font-family:'DM Serif Display',Georgia,serif;
  font-size:18px; color:var(--ink); letter-spacing:-0.3px;
}

/* bottom row: For + Sig */
.cheque-bottom {
  display:flex; align-items:flex-end; gap:24px; margin-top:auto;
}
.cheque-sig {
  flex:0 0 200px; text-align:center;
}
.cheque-sig-line {
  border-bottom:1.5px solid var(--ink);
  height:28px; margin-bottom:4px;
}
.cheque-sig-label {
  font-size:8px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--ink3);
}

/* bottom gradient bar */
.cheque-bar-btm {
  height:5px; flex-shrink:0; position:relative; z-index:1;
  background: linear-gradient(90deg, var(--pink2) 0%, var(--pink) 45%, #17324d 100%);
}

/* ═══ PRINT ═══ */
@media print {
  @page { size: 70cm 33cm; margin: 0; }
  body { background:#fff; padding:0; display:block; justify-content:unset; }
  .print-btn { display:none; }
  .cheque-wrap {
    box-shadow:none; border-radius:0;
    width:700px; height:330px;
    page-break-inside:avoid;
  }
  * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
}
</style>
</head>
<body>

<button class="print-btn" onclick="window.print()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
  Print / Save as PDF
</button>

<div class="cheque-wrap">
  <div class="cheque">

    <!-- watermark -->
    <img class="cheque-wm" src="photos/hackathon.png" alt=""/>

    <div class="cheque-bar-top"></div>

    <div class="cheque-body">

      <!-- HEADER -->
      <div class="cheque-hdr">
        <div class="cheque-logo">
          <img src="photos/nexavenu-logo.png" alt="Nexavenu"/>
        </div>
        <div class="cheque-hdr-right">
          <div class="cheque-event-name">
            Agentforce&nbsp;
            <img src="photos/hackathon.png" alt="Hackathon"/>
          </div>
          <div class="cheque-sub">Cheque · 2026</div>
        </div>
      </div>

      <div class="cheque-hr"></div>

      <!-- DATE -->
      <div class="cheque-date">18 June 2026</div>

      <!-- PAY TO + AMOUNT -->
      <div class="f-row">
        <span class="f-label">Pay to the order of</span>
        <div class="f-line"></div>
        <div class="f-amount-group">
          <span class="f-rs">Rs</span>
          <div class="f-amount-box">
            <div class="f-amount-box-label">Amount</div>
            <div class="f-amount-val">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>
          </div>
        </div>
      </div>

      <!-- IN WORDS -->
      <div class="f-row">
        <span class="f-label">In words</span>
        <div class="f-line"></div>
        <span style="font-size:10px;font-weight:700;color:var(--ink3);padding-bottom:4px;white-space:nowrap;">Rupees only</span>
      </div>

      <!-- FOR + SIGNATURE -->
      <div class="cheque-bottom">
        <div style="flex:1;">
          <div class="f-row" style="margin-bottom:0;">
            <span class="f-label">For</span>
            <div class="f-line"></div>
          </div>
        </div>
        <div class="cheque-sig">
          <div class="cheque-sig-line"></div>
          <div class="cheque-sig-label">Authorised Signature</div>
        </div>
      </div>

    </div><!-- /body -->

    <div class="cheque-bar-btm"></div>
  </div>
</div>

</body>
</html>
